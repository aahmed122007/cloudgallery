# =========================================================================
# Deploys the frontend to Azure Blob Storage static website whenever
# code lands on `main`.
#
# Prerequisites (set once in the GitHub repo under Settings → Secrets):
#   AZURE_STORAGE_CONNECTION_STRING → connection string for cgstorageaa2007
# =========================================================================
name: Deploy Frontend (Blob Storage)

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload to Azure Blob static website
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az storage blob upload-batch \
              --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              --source frontend \
              --destination '$web' \
              --overwrite
