<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Explore — CloudGallery</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
    <div class="app-layout">
        <nav class="sidebar" id="sidebar"></nav>
        <main class="main">
            <div id="topbar-slot"></div>

            <div id="search-banner" class="hidden" style="background:var(--primary-light);border:1.5px solid #c7d2fe;border-radius:var(--radius);padding:14px 20px;margin-bottom:20px;font-size:14px;color:var(--primary-dark);font-weight:500;"></div>

            <div class="section-header">
                <h2 id="section-title">All Media</h2>
            </div>

            <div id="grid" class="grid"></div>
            <div id="empty" class="empty-state hidden">
                <div class="es-icon">🔍</div>
                <h3>Nothing found</h3>
                <p id="empty-msg">Try a different search term or tag.</p>
            </div>
        </main>
    </div>
    <div id="modal-backdrop" class="modal-backdrop"></div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script>
        Auth.requireLogin();
        UI.renderSidebar("feed");
        UI.renderTopbar("Explore", "Browse all media");

        const params = new URLSearchParams(window.location.search);
        const query = params.get("q");
        const tag = params.get("tag");

        async function load() {
            const grid = document.getElementById("grid");
            const empty = document.getElementById("empty");
            const banner = document.getElementById("search-banner");
            const title = document.getElementById("section-title");
            grid.innerHTML = "";

            try {
                let items = [];
                if (query || tag) {
                    banner.classList.remove("hidden");
                    banner.textContent = query ? `🔍 Results for "${query}"` : `🏷️ Showing tag: "${tag}"`;
                    title.textContent = query ? `Search: ${query}` : `Tag: ${tag}`;
                    const res = await API.searchMedia({ q: query, tag });
                    items = res.items;
                } else {
                    const res = await API.listMedia(null, 100);
                    items = res.items;
                }
                if (!items.length) {
                    empty.classList.remove("hidden");
                    document.getElementById("empty-msg").textContent = (query || tag)
                        ? "No media matches your search. Try another keyword."
                        : "No media uploaded yet — be the first!";
                    return;
                }
                empty.classList.add("hidden");
                items.forEach(m => grid.appendChild(UI.mediaCard(m, UI.showModal.bind(UI))));
            } catch (err) { UI.toast(err.message, "error"); }
        }

        load();
        document.addEventListener("media-updated", load);

        setTimeout(() => {
            if (query) {
                const input = document.getElementById("global-search");
                if (input) input.value = query;
            }
        }, 50);
    </script>
</body>
</html>
