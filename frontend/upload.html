<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload — CloudGallery</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
    <div class="app-layout">
        <nav class="sidebar" id="sidebar"></nav>
        <main class="main">
            <div id="topbar-slot"></div>

            <div class="page-header">
                <h1>Upload Media</h1>
                <p>Share your photos and videos with the community</p>
            </div>

            <div class="upload-card">
                <div id="drop-zone" class="drop-zone">
                    <div class="dz-icon">📂</div>
                    <h3>Drop your file here</h3>
                    <p>or <strong>click to browse</strong> — JPG, PNG, GIF, WebP, MP4 · max 10 MB</p>
                    <img id="preview" class="preview hidden" />
                </div>
                <input type="file" id="file-input" accept="image/*,video/*" class="hidden" />

                <form id="upload-form">
                    <div class="form-group">
                        <label>Title *</label>
                        <input type="text" id="title" placeholder="Give your photo a title" maxlength="200" required />
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="description" rows="3" placeholder="Tell us about this photo..." maxlength="1000"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Tags <span style="font-weight:400;text-transform:none;font-size:12px;color:var(--text-muted)">(comma separated)</span></label>
                        <input type="text" id="tags" placeholder="e.g. travel, nature, sunset" />
                    </div>
                    <div style="display:flex;gap:12px;">
                        <button type="submit" class="btn btn-primary" id="submit-btn" style="flex:1;">Upload Photo</button>
                        <a href="dashboard.html" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script>
        Auth.requireLogin();
        UI.renderSidebar("upload");
        UI.renderTopbar("Upload", "Share something new");

        const dropZone = document.getElementById("drop-zone");
        const fileInput = document.getElementById("file-input");
        const preview = document.getElementById("preview");
        let selectedFile = null;

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = () => selectFile(fileInput.files[0]);

        dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("drag-over"); });
        dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
        dropZone.addEventListener("drop", (e) => {
            e.preventDefault(); dropZone.classList.remove("drag-over");
            if (e.dataTransfer.files.length) selectFile(e.dataTransfer.files[0]);
        });

        function selectFile(file) {
            if (!file) return;
            if (file.size > 10 * 1024 * 1024) { UI.toast("File too large (max 10 MB)", "error"); return; }
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = (e) => { preview.src = e.target.result; preview.classList.remove("hidden"); };
            reader.readAsDataURL(file);
            dropZone.querySelector("h3").textContent = file.name;
        }

        document.getElementById("upload-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            if (!selectedFile) { UI.toast("Please choose a file first", "error"); return; }
            const btn = document.getElementById("submit-btn");
            btn.disabled = true; btn.textContent = "Uploading...";
            try {
                await API.uploadMedia(
                    selectedFile,
                    document.getElementById("title").value.trim(),
                    document.getElementById("description").value.trim(),
                    document.getElementById("tags").value.trim()
                );
                UI.toast("Uploaded! AI tagging running in background…", "success");
                setTimeout(() => window.location.href = "dashboard.html", 800);
            } catch (err) {
                UI.toast(err.message, "error");
                btn.disabled = false; btn.textContent = "Upload Photo";
            }
        });
    </script>
</body>
</html>
