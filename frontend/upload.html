<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload — CloudGallery</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
    <div class="app-layout">
        <nav class="sidebar"></nav>
        <main class="main">
            <div class="topbar"></div>

            <div class="upload-card">
                <h2 style="margin-bottom:20px;">Upload Media</h2>

                <div id="drop-zone" class="drop-zone">
                    <div class="icon">☁️⬆️</div>
                    <p><strong>Click to choose a file</strong> or drag &amp; drop here</p>
                    <p style="font-size:12px;margin-top:4px;">Images (JPG, PNG, GIF, WebP) up to 10 MB</p>
                    <img id="preview" class="preview hidden" />
                </div>
                <input type="file" id="file-input" accept="image/*,video/*" class="hidden" />

                <form id="upload-form">
                    <div class="form-group">
                        <label for="title">Title *</label>
                        <input type="text" id="title" maxlength="200" required />
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" rows="3" maxlength="1000"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="tags">Tags <small style="color:var(--text-muted);font-weight:normal;">(comma separated)</small></label>
                        <input type="text" id="tags" placeholder="travel, beach, sunset" />
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Upload</button>
                </form>
            </div>
        </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script>
        Auth.requireLogin();
        UI.renderSidebar("upload");
        UI.renderTopbar("Upload");

        const dropZone = document.getElementById("drop-zone");
        const fileInput = document.getElementById("file-input");
        const preview = document.getElementById("preview");
        let selectedFile = null;

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = () => selectFile(fileInput.files[0]);

        dropZone.addEventListener("dragover", (e) => {
            e.preventDefault();
            dropZone.classList.add("drag-over");
        });
        dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
        dropZone.addEventListener("drop", (e) => {
            e.preventDefault();
            dropZone.classList.remove("drag-over");
            if (e.dataTransfer.files.length) selectFile(e.dataTransfer.files[0]);
        });

        function selectFile(file) {
            if (!file) return;
            if (file.size > 10 * 1024 * 1024) {
                UI.toast("File too large (max 10 MB)", "error");
                return;
            }
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.src = e.target.result;
                preview.classList.remove("hidden");
            };
            reader.readAsDataURL(file);
        }

        document.getElementById("upload-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            if (!selectedFile) {
                UI.toast("Please choose a file first", "error");
                return;
            }
            const title = document.getElementById("title").value.trim();
            const description = document.getElementById("description").value.trim();
            const tags = document.getElementById("tags").value.trim();

            const btn = document.getElementById("submit-btn");
            btn.disabled = true;
            btn.textContent = "Uploading...";

            try {
                await API.uploadMedia(selectedFile, title, description, tags);
                UI.toast("Upload successful!", "success");
                setTimeout(() => window.location.href = "dashboard.html", 600);
            } catch (err) {
                UI.toast(err.message, "error");
                btn.disabled = false;
                btn.textContent = "Upload";
            }
        });
    </script>
</body>
</html>
