<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile — CloudGallery</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
    <div class="app-layout">
        <nav class="sidebar" id="sidebar"></nav>
        <main class="main">
            <div id="topbar-slot"></div>

            <div class="profile-banner">
                <div id="avatar" class="profile-avatar-lg"></div>
                <div class="profile-info">
                    <div style="display:flex;align-items:center;gap:10px">
                        <h2 id="user-name"></h2>
                        <button onclick="toggleNameEdit()" style="background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,0.4);color:#fff;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600">✏️ Edit</button>
                    </div>
                    <div id="name-edit-form" style="display:none;align-items:center;gap:8px;margin:8px 0">
                        <input id="new-name" style="padding:7px 10px;border:1.5px solid rgba(255,255,255,0.4);border-radius:6px;background:rgba(255,255,255,0.15);color:#fff;font-size:14px;width:180px" placeholder="Your name" />
                        <button onclick="saveNameEdit()" style="background:#fff;color:var(--primary);border:none;padding:7px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600">Save</button>
                        <button onclick="toggleNameEdit()" style="background:none;border:1.5px solid rgba(255,255,255,0.4);color:#fff;padding:7px 14px;border-radius:6px;cursor:pointer;font-size:13px">Cancel</button>
                    </div>
                    <p id="user-email"></p>
                    <div class="profile-stats">
                        <div class="pstat"><div class="pstat-value" id="pstat-uploads">—</div><div class="pstat-label">Uploads</div></div>
                        <div class="pstat"><div class="pstat-value" id="pstat-likes">—</div><div class="pstat-label">Likes</div></div>
                        <div class="pstat"><div class="pstat-value" id="pstat-joined">—</div><div class="pstat-label">Member since</div></div>
                    </div>
                </div>
            </div>

            <div class="section-header">
                <h2>My Media</h2>
                <a href="upload.html" class="btn btn-primary" style="padding:8px 16px;font-size:13px;">+ Upload</a>
            </div>

            <div id="grid" class="grid"></div>
            <div id="empty" class="empty-state hidden">
                <div class="es-icon">🖼️</div>
                <h3>No uploads yet</h3>
                <p>Share your first photo with the community</p>
                <a href="upload.html" class="btn btn-primary" style="margin-top:16px;">Upload now</a>
            </div>
        </main>
    </div>
    <div id="modal-backdrop" class="modal-backdrop"></div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script>
        Auth.requireLogin();
        UI.renderSidebar("profile");
        UI.renderTopbar("My Profile", "Manage your account");

        let user = Auth.user();
        document.getElementById("avatar").textContent = UI.initials(user.name);
        document.getElementById("user-name").textContent = user.name;
        document.getElementById("user-email").textContent = user.email;

        function toggleNameEdit() {
            const form = document.getElementById("name-edit-form");
            if (form.style.display === "none" || !form.style.display) {
                document.getElementById("new-name").value = user.name;
                form.style.display = "flex";
            } else {
                form.style.display = "none";
            }
        }

        async function saveNameEdit() {
            const newName = document.getElementById("new-name").value.trim();
            if (!newName) { UI.toast("Name cannot be empty", "error"); return; }
            try {
                await API.updateUser(user.userId, { name: newName });
                document.getElementById("user-name").textContent = newName;
                document.getElementById("avatar").textContent = UI.initials(newName);
                user = { ...user, name: newName };
                Auth.save(Auth.token(), user);
                toggleNameEdit();
                UI.toast("Name updated", "success");
            } catch (err) { UI.toast(err.message, "error"); }
        }

        async function loadProfile() {
            try {
                const details = await API.getUser(user.userId);
                const d = new Date(details.createdDate);
                document.getElementById("pstat-joined").textContent =
                    d.toLocaleString("default", { month: "short", year: "numeric" });
            } catch (e) {}

            try {
                const { items } = await API.listMedia(user.userId, 100);
                const totalLikes = items.reduce((s, m) => s + (m.likes || 0), 0);
                document.getElementById("pstat-uploads").textContent = items.length;
                document.getElementById("pstat-likes").textContent = totalLikes;

                const grid = document.getElementById("grid");
                const empty = document.getElementById("empty");
                grid.innerHTML = "";
                if (!items.length) { empty.classList.remove("hidden"); return; }
                empty.classList.add("hidden");
                items.forEach(m => grid.appendChild(UI.mediaCard(m, UI.showModal.bind(UI))));
            } catch (err) { UI.toast(err.message, "error"); }
        }

        loadProfile();
        document.addEventListener("media-updated", loadProfile);
    </script>
</body>
</html>
