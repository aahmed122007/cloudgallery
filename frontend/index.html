<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CloudGallery — Sign In</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h1>☁️ CloudGallery</h1>
            <p class="subtitle">A cloud-native multimedia sharing platform</p>

            <div class="auth-tabs">
                <button id="tab-login" class="active" onclick="showTab('login')">Login</button>
                <button id="tab-register" onclick="showTab('register')">Register</button>
            </div>

            <!-- Login form -->
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" required />
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required />
                </div>
                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
                <p class="form-footer">New here? <a href="#" onclick="showTab('register'); return false;">Create an account</a></p>
            </form>

            <!-- Register form -->
            <form id="register-form" class="auth-form hidden">
                <div class="form-group">
                    <label for="reg-name">Full name</label>
                    <input type="text" id="reg-name" required />
                </div>
                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" required />
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" required minlength="6" />
                </div>
                <button type="submit" class="btn btn-primary btn-block">Create Account</button>
                <p class="form-footer">Already registered? <a href="#" onclick="showTab('login'); return false;">Sign in</a></p>
            </form>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script>
        // Redirect to dashboard if already signed in
        if (Auth.isLoggedIn()) window.location.href = "dashboard.html";

        function showTab(tab) {
            document.getElementById("tab-login").classList.toggle("active", tab === "login");
            document.getElementById("tab-register").classList.toggle("active", tab === "register");
            document.getElementById("login-form").classList.toggle("hidden", tab !== "login");
            document.getElementById("register-form").classList.toggle("hidden", tab !== "register");
        }

        document.getElementById("login-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("login-email").value.trim();
            const password = document.getElementById("login-password").value;
            try {
                const { token, user } = await API.login(email, password);
                Auth.save(token, user);
                UI.toast("Welcome back!", "success");
                setTimeout(() => window.location.href = "dashboard.html", 400);
            } catch (err) {
                UI.toast(err.message, "error");
            }
        });

        document.getElementById("register-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const name = document.getElementById("reg-name").value.trim();
            const email = document.getElementById("reg-email").value.trim();
            const password = document.getElementById("reg-password").value;
            try {
                const { token, user } = await API.register(name, email, password);
                Auth.save(token, user);
                UI.toast("Account created! Redirecting...", "success");
                setTimeout(() => window.location.href = "dashboard.html", 400);
            } catch (err) {
                UI.toast(err.message, "error");
            }
        });
    </script>
</body>
</html>
